<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Player Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    .container { width: 100%; max-width: 560px; }

    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    header p { font-size: 14px; color: #888; }

    .search-box {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .search-box input {
      flex: 1; padding: 12px 16px; border-radius: 10px;
      border: 1px solid #2a2a2a; background: #1a1a1a;
      color: #fff; font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #e8573e; }
    .search-box input::placeholder { color: #555; }

    .search-box button {
      padding: 12px 22px; border-radius: 10px;
      background: #e8573e; border: none;
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-box button:hover { background: #d44d35; }
    .search-box button:active { transform: scale(0.97); }
    .search-box button:disabled { background: #555; cursor: not-allowed; transform: none; }

    .error-msg {
      background: #2a1a1a; border: 1px solid #5a2020;
      color: #f08080; padding: 10px 14px;
      border-radius: 10px; font-size: 13px; margin-bottom: 16px;
      display: none;
    }

    .loading {
      text-align: center; color: #888; font-size: 14px;
      padding: 20px 0; display: none;
    }

    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 16px; padding: 24px;
      display: none; animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .profile-top { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }

    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: #2a2a2a; overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; color: #888;
      border: 2px solid #333;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .profile-info { flex: 1; min-width: 0; }
    .profile-info .display { font-size: 22px; font-weight: 700; color: #fff; }
    .profile-info .username { font-size: 13px; color: #888; margin: 4px 0 8px; }

    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      font-weight: 600; letter-spacing: 0.02em;
    }
    .badge-verified { background: #1a3a5a; color: #60b0ff; }
    .badge-banned   { background: #3a1a1a; color: #ff6060; }
    .badge-active   { background: #1a3a1a; color: #60d060; }

    .bio {
      font-size: 13px; color: #aaa; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      background: #141414; border-radius: 10px;
      padding: 12px 14px; margin-bottom: 16px;
      border-left: 3px solid #e8573e;
      display: none;
    }

    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 20px;
    }
    .stat-card {
      background: #141414; border-radius: 10px;
      padding: 12px; text-align: center;
    }
    .stat-card .label { font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 15px; font-weight: 600; color: #fff; }

    .profile-btn {
      display: block; text-align: center;
      padding: 10px; border-radius: 10px;
      background: #222; border: 1px solid #333;
      color: #aaa; text-decoration: none; font-size: 14px;
      transition: background 0.2s, color 0.2s; margin-bottom: 20px;
    }
    .profile-btn:hover { background: #2a2a2a; color: #fff; }

    .games-section { display: none; }
    .games-title {
      font-size: 11px; font-weight: 600; color: #666;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .game-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #222;
      font-size: 13px;
    }
    .game-item:last-child { border-bottom: none; }
    .game-name { color: #ddd; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .game-plays { color: #666; font-size: 12px; white-space: nowrap; margin-left: 12px; }

    footer { margin-top: 40px; text-align: center; font-size: 12px; color: #444; }
    footer a { color: #666; text-decoration: none; }
    footer a:hover { color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎮 Roblox Player Search</h1>
      <p>Tìm kiếm thông tin người chơi Roblox</p>
    </header>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="Nhập username hoặc User ID..." />
      <button id="search-btn" onclick="searchPlayer()">Tìm kiếm</button>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <div class="loading" id="loading">Đang tìm kiếm...</div>

    <div class="card" id="result-card">
      <div class="profile-top">
        <div class="avatar" id="avatar-wrap">?</div>
        <div class="profile-info">
          <div class="display" id="display-name"></div>
          <div class="username" id="username-line"></div>
          <div class="badges" id="badges"></div>
        </div>
      </div>

      <div class="bio" id="bio-text"></div>

      <div class="stats">
        <div class="stat-card">
          <div class="label">User ID</div>
          <div class="value" id="stat-id">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Tham gia</div>
          <div class="value" id="stat-joined">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Trạng thái</div>
          <div class="value" id="stat-status">—</div>
        </div>
      </div>

      <a class="profile-btn" id="profile-link" href="#" target="_blank">Xem profile trên Roblox ↗</a>

      <div class="games-section" id="games-section">
        <div class="games-title">Games nổi bật</div>
        <div id="games-list"></div>
      </div>
    </div>

    <footer>
      Powered by <a href="https://create.roblox.com/docs/cloud/legacy" target="_blank">Roblox API</a>
      · Worker by <a href="https://workers.cloudflare.com" target="_blank">Cloudflare Workers</a>
    </footer>
  </div>

  <script>
    // ⚠️ Đổi URL này thành Worker của bạn
    const WORKER = "https://gentle-hall-e65f.atnoob3034.workers.dev";

    async function get(url) {
      const res = await fetch(`${WORKER}?url=${encodeURIComponent(url)}`);
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }

    async function searchPlayer() {
      const input = document.getElementById('search-input').value.trim();
      if (!input) return;

      setError('');
      setLoading(true);
      document.getElementById('result-card').style.display = 'none';
      document.getElementById('games-section').style.display = 'none';

      try {
        let userId = null;

        if (/^\d+$/.test(input)) {
          userId = input;
        } else {
          const data = await get(`https://users.roblox.com/v1/users/search?keyword=${encodeURIComponent(input)}&limit=10`);
          const match = data?.data?.find(u => u.name.toLowerCase() === input.toLowerCase());
          if (match) {
            userId = match.id;
          } else if (data?.data?.length) {
            userId = data.data[0].id;
          } else {
            setError('Không tìm thấy username "' + input + '". Thử nhập User ID (số).');
            return;
          }
        }

        const user = await get(`https://users.roblox.com/v1/users/${userId}`);
        if (!user || user.errors?.length) {
          setError('Không tìm thấy người dùng ID: ' + userId);
          return;
        }

        let avatarUrl = null;
        try {
          const av = await get(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=150x150&format=Png`);
          avatarUrl = av?.data?.[0]?.imageUrl;
        } catch {}

        showResult(user, avatarUrl);
        fetchGames(userId);

      } catch (e) {
        setError('Lỗi kết nối: ' + e.message);
      } finally {
        setLoading(false);
      }
    }

    function showResult(user, avatarUrl) {
      document.getElementById('display-name').textContent = user.displayName || user.name;
      document.getElementById('username-line').textContent = '@' + user.name + ' · ID: ' + user.id;
      document.getElementById('stat-id').textContent = '#' + user.id;

      const bio = user.description?.trim();
      const bioEl = document.getElementById('bio-text');
      if (bio) { bioEl.textContent = bio; bioEl.style.display = 'block'; }
      else { bioEl.style.display = 'none'; }

      const joined = user.created
        ? new Date(user.created).toLocaleDateString('vi-VN', { year: 'numeric', month: 'short', day: 'numeric' })
        : '—';
      document.getElementById('stat-joined').textContent = joined;

      const statusEl = document.getElementById('stat-status');
      statusEl.textContent = user.isBanned ? 'Bị ban' : 'OK';
      statusEl.style.color = user.isBanned ? '#ff6060' : '#60d060';

      const badges = document.getElementById('badges');
      badges.innerHTML = '';
      if (user.hasVerifiedBadge) badges.innerHTML += `<span class="badge badge-verified">Đã xác thực</span>`;
      if (user.isBanned) badges.innerHTML += `<span class="badge badge-banned">Bị ban</span>`;
      else badges.innerHTML += `<span class="badge badge-active">Hoạt động</span>`;

      const avatarWrap = document.getElementById('avatar-wrap');
      const initial = (user.name || '?')[0].toUpperCase();
      if (avatarUrl) {
        avatarWrap.innerHTML = `<img src="${avatarUrl}" alt="avatar" onerror="this.parentElement.textContent='${initial}'" />`;
      } else {
        avatarWrap.textContent = initial;
      }

      document.getElementById('profile-link').href = `https://www.roblox.com/users/${user.id}/profile`;
      document.getElementById('result-card').style.display = 'block';
    }

    async function fetchGames(userId) {
      try {
        const data = await get(`https://www.roblox.com/users/profile/playergames-json?userId=${userId}`);
        const games = data?.Games;
        if (!games?.length) return;
        const list = document.getElementById('games-list');
        list.innerHTML = '';
        games.slice(0, 5).forEach(g => {
          const item = document.createElement('div');
          item.className = 'game-item';
          item.innerHTML = `
            <span class="game-name">${g.Name}</span>
            <span class="game-plays">${(g.Plays || 0).toLocaleString('vi-VN')} lượt</span>
          `;
          list.appendChild(item);
        });
        document.getElementById('games-section').style.display = 'block';
      } catch {}
    }

    function setError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function setLoading(v) {
      document.getElementById('loading').style.display = v ? 'block' : 'none';
      document.getElementById('search-btn').disabled = v;
      document.getElementById('search-btn').textContent = v ? 'Đang tìm...' : 'Tìm kiếm';
    }

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchPlayer();
    });
  </script>
</body>
</html>
